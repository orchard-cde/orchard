name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build Native Images & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build native images
        run: ./gradlew :trellis:nativeCompile :trowel:nativeCompile

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp trellis/build/native/nativeCompile/orchard-server release-artifacts/orchard-server-linux-amd64
          cp trowel/build/native/nativeCompile/trowel release-artifacts/trowel-linux-amd64
          cd release-artifacts
          sha256sum * > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-artifacts/orchard-server-linux-amd64
            release-artifacts/trowel-linux-amd64
            release-artifacts/checksums-sha256.txt
