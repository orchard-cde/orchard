name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            runner: ubuntu-latest
            os: linux
            arch: amd64
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - label: macos-arm64
            runner: macos-latest
            os: macos
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build native images
        run: ./gradlew -Pversion=${{ steps.version.outputs.version }} :trellis:nativeCompile :trowel:nativeCompile

      - name: Smoke test trowel
        run: |
          echo "=== trowel --version ==="
          BIN=./trowel/build/native/nativeCompile/trowel
          $BIN --version
          $BIN --version | grep -q "${{ steps.version.outputs.version }}" && echo "Version matches tag"
          echo "=== trowel --help ==="
          file $BIN
          $BIN --help

      - name: Smoke test orchard-server
        run: |
          echo "=== orchard-server binary verification ==="
          file trellis/build/native/nativeCompile/orchard-server
          strings trellis/build/native/nativeCompile/orchard-server | grep -q "${{ steps.version.outputs.version }}" && echo "Version string found in binary"

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          cd artifacts

          cp ../trellis/build/native/nativeCompile/orchard-server .
          tar czf orchard-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz orchard-server
          rm orchard-server

          cp ../trowel/build/native/nativeCompile/trowel .
          tar czf trowel-${{ matrix.os }}-${{ matrix.arch }}.tar.gz trowel
          rm trowel

          sha256sum *.tar.gz | tee checksums-sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: artifacts/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            orchard-server-linux-amd64.tar.gz
            orchard-server-linux-arm64.tar.gz
            orchard-server-macos-arm64.tar.gz
            trowel-linux-amd64.tar.gz
            trowel-linux-arm64.tar.gz
            trowel-macos-arm64.tar.gz
            checksums-sha256.txt
