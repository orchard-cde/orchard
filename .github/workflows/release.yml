name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # macOS arm64 is intentionally omitted: GraalVM native-image of the Spring Boot
        # orchard-server peaks at ~11 GB RSS, which does not fit GitHub's standard macOS
        # runner (~7 GB), and larger runners are billed. macOS binaries are produced
        # out-of-band until a self-hosted/larger Mac runner is available.
        include:
          - label: linux-amd64
            runner: ubuntu-latest
            os: linux
            arch: amd64
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@186d0493a2df5eb62df5ecc498883d18fd58c303  # v1
        with:
          java-version: '25'
          distribution: graalvm
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build native images
        run: ./gradlew -PreleaseVersion=${{ steps.version.outputs.version }} :trellis:nativeCompile :trowel:nativeCompile

      - name: Smoke test trowel
        run: |
          echo "=== trowel --version ==="
          BIN=./trowel/build/native/nativeCompile/trowel
          $BIN --version
          $BIN --version | grep -q "${{ steps.version.outputs.version }}" && echo "Version matches tag"
          echo "=== trowel --help ==="
          file $BIN
          $BIN --help

      - name: Smoke test orchard-server
        run: |
          echo "=== orchard-server binary verification ==="
          file trellis/build/native/nativeCompile/orchard-server
          strings trellis/build/native/nativeCompile/orchard-server | grep -q "${{ steps.version.outputs.version }}" && echo "Version string found in binary"

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          cd artifacts

          cp ../trellis/build/native/nativeCompile/orchard-server .
          tar czf orchard-server-${{ matrix.os }}-${{ matrix.arch }}.tar.gz orchard-server
          rm orchard-server

          cp ../trowel/build/native/nativeCompile/trowel .
          tar czf trowel-${{ matrix.os }}-${{ matrix.arch }}.tar.gz trowel
          rm trowel

          sha256sum *.tar.gz | tee checksums-sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-${{ matrix.label }}
          path: artifacts/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3
        with:
          generate_release_notes: true
          files: |
            orchard-server-linux-amd64.tar.gz
            orchard-server-linux-arm64.tar.gz
            trowel-linux-amd64.tar.gz
            trowel-linux-arm64.tar.gz
            checksums-sha256.txt
