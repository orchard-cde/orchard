name: OpenRewrite

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview changes without committing)'
        type: boolean
        default: false
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  rewrite:
    name: Run OpenRewrite recipes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      - name: Dry run
        if: ${{ inputs.dry_run }}
        run: ./gradlew rewriteDryRun

      - name: Apply recipes
        if: ${{ !inputs.dry_run }}
        run: ./gradlew rewriteRun

      - name: Upload dry run report
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: rewrite-dry-run-report
          path: build/reports/rewrite/
          retention-days: 7

      - name: Open pull request
        if: ${{ !inputs.dry_run }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8
        with:
          commit-message: 'chore: apply OpenRewrite recipes'
          title: 'chore: apply OpenRewrite recipes'
          body: |
            Automated changes from the OpenRewrite weekly recipe run.

            Recipes applied:
            - `dev.orchard.DependencyCleanup`
            - `dev.orchard.BestPractices`
          branch: openrewrite/auto
          delete-branch: true
