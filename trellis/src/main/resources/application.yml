spring:
  application:
    name: orchard

  datasource:
    url: jdbc:postgresql://localhost:5432/orchard
    username: orchard
    password: orchard
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Uncomment when orchard.security.oauth2.enabled=true to configure JWT validation
# security:
#   oauth2:
#     resourceserver:
#       jwt:
#         issuer-uri: https://your-idp.example.com/realms/orchard

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

orchard:
  security:
    oauth2:
      # Set to true to enable JWT authentication. When false (default), all
      # requests are permitted for local development without an identity provider.
      enabled: false
  # Uncomment and configure when enabling OAuth2:
  # issuer-uri: https://your-idp.example.com/realms/orchard

  nursery:
    # Default provider: qemu, aws, gcp, azure
    provider: qemu

  # AWS EC2 provider configuration
  # Uncomment and configure to enable:
  # aws:
  #   region: us-east-1
  #   ami-id: ami-0123456789abcdef0       # vanilla Ubuntu LTS recommended
  #   key-pair-name: orchard-keypair
  #   security-group-id: sg-0123456789abcdef0
  #   subnet-id: subnet-0123456789abcdef0
  #   instance-type-mapping:
  #     2: t3.small
  #     4: t3.medium
  #     8: t3.xlarge
  #   ip-mode: AUTO                       # AUTO (default), PUBLIC, or PRIVATE
  #   ssh-key-path: ~/.ssh/orchard_ed25519  # public key (.pub variant) injected into cloud-init

  # GCP Compute Engine provider configuration
  # Uncomment and configure to enable:
  # gcp:
  #   project: my-gcp-project
  #   zone: us-central1-a
  #   image-family: ubuntu-2204-lts
  #   image-project: ubuntu-os-cloud
  #   machine-type-mapping:
  #     2: e2-standard-2
  #     4: e2-standard-4
  #     8: e2-standard-8

  # Azure VM provider configuration
  # Uncomment and configure to enable:
  # azure:
  #   subscription-id: 00000000-0000-0000-0000-000000000000
  #   resource-group: orchard-rg
  #   location: eastus
  #   vm-size-mapping:
  #     2: Standard_B2s
  #     4: Standard_B4ms
  #     8: Standard_D8s_v3

  greenhouse:
    registry-url: localhost:5000
    username: ""
    password: ""
    prebuild-enabled: false
    prebuild-interval-minutes: 60
    work-dir: /tmp/orchard/greenhouse

  qemu:
    # qemu-binary and qemu-img-binary intentionally omitted: defaults come from
    # QemuPlatformDefaults so macOS picks up /opt/homebrew/bin/* and Linux picks
    # up /usr/bin/*. QemuEnvironmentInitializer also falls back to PATH.
    base-image-path: /tmp/orchard/images/base.qcow2
    vm-storage-path: /tmp/orchard/vms
    cloud-init-template-path: /tmp/orchard/cloud-init
    ssh-port-range-start: 49152
    ssh-port-range-end: 49999
    # enable-kvm and serial-output intentionally omitted: defaults come from
    # QemuPlatformDefaults so macOS uses HVF (enable-kvm=false, serial=file)
    # and Linux uses KVM (enable-kvm=true, serial=stdio).
    ssh-public-key: ${ORCHARD_SSH_PUBLIC_KEY:}
    # ssh-key-path defaults to ~/.ssh/orchard_ed25519 (via QemuPlatformDefaults)
    # ssh-key-path: /home/user/.ssh/orchard_ed25519
    auto-provision: true

logging:
  level:
    dev.orchard: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: WARN

# Uncomment when orchard.security.oauth2.enabled=true to configure JWT validation
# security:
#   oauth2:
#     resourceserver:
#       jwt:
#         issuer-uri: https://your-idp.example.com/realms/orchard

spring.web.error.include-message: always

# Uncomment when orchard.security.oauth2.enabled=true to configure JWT validation
# security:
#   oauth2:
#     resourceserver:
#       jwt:
#         issuer-uri: https://your-idp.example.com/realms/orchard

spring.web.error.include-stacktrace: never
