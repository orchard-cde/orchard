spring:
  datasource:
    url: jdbc:h2:file:${user.home}/.orchard/data/orchard;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

orchard:
  security:
    oauth2:
      enabled: false
