org.gradle.parallel=true
org.gradle.caching=true
# Configuration cache is opt-in (pass --configuration-cache), not on by default. The GraalVM
# buildtools plugin registers a build service (GraalVMReachabilityMetadataService) that is not
# configuration-cache serializable, so enabling it globally breaks nativeCompile / install /
# release. The compile/test/bootRun loop IS compatible — opt in there for faster builds.
org.gradle.configuration-cache=false
