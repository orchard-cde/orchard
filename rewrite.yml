# test the result — Spring Boot 4 introduces breaking changes across the whole stack.
type: specs.openrewrite.org/v1beta/recipe
name: dev.orchard.SpringBootMigration
displayName: Migrate to Spring Boot 4 (INACTIVE - see issue #10)
recipeList:
  - org.openrewrite.java.spring.boot4.UpgradeSpringBoot_4_0
