---
type: specs.openrewrite.org/v1beta/recipe
name: dev.orchard.DependencyCleanup
displayName: Remove explicit version pins duplicated by Spring Boot BOM
recipeList:
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: org.slf4j
      artifactId: slf4j-api
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: org.slf4j
      artifactId: slf4j-simple
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: com.fasterxml.jackson.core
      artifactId: jackson-databind
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: com.fasterxml.jackson.datatype
      artifactId: jackson-datatype-jsr310
---
type: specs.openrewrite.org/v1beta/recipe
name: dev.orchard.BestPractices
displayName: Orchard best practices
recipeList:
  - org.openrewrite.gradle.GradleBestPractices
  - org.openrewrite.java.testing.junit5.JUnit5BestPractices
  - org.openrewrite.staticanalysis.CommonStaticAnalysis
  - org.openrewrite.java.RemoveUnusedImports
  - org.openrewrite.java.format.EmptyNewlineAtEndOfFile
---
type: specs.openrewrite.org/v1beta/style
name: dev.orchard.Style
displayName: Orchard code style — never fold imports into wildcards
styleConfigs:
  # JUnit Jupiter 6 ships org.junit.jupiter.api.MediaType. When OrderImports folds
  # explicit imports into a wildcard (e.g. org.springframework.http.*), it collides
  # with that class and breaks compilation. Force explicit imports everywhere.
  - org.openrewrite.java.style.ImportLayoutStyle:
      classCountToUseStarImport: 2147483647
      nameCountToUseStarImport: 2147483647
      layout:
        - import all other imports
        - <blank line>
        - import javax.*
        - import java.*
        - <blank line>
        - import static all other imports
---
# NOT ACTIVE: This recipe is intentionally excluded from the activeRecipe() list in build.gradle.kts.
# It is a placeholder for the Spring Boot 4 migration effort tracked in issue #10.
